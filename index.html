<!DOCTYPE html>
<html>
<head>
    <title>AI App</title>
</head>
<body>

<h1>AI App Generator</h1>

<input id="prompt" type="text" placeholder="Enter idea" />

<br><br>

<button onclick="generate()">Generate</button>
<button onclick="loadIdeas()">Show Ideas</button>

<p id="result"></p>
<ul id="ideas"></ul>

<script>
async function generate() {
    const prompt = document.getElementById("prompt").value;

    const resultBox = document.getElementById("result");
    resultBox.innerText = "Loading...";

    try {
        const res = await fetch("https://tunify-api.onrender.com/agent ", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ prompt: prompt })
        });

        const data = await res.json();
        resultBox.innerText = data.result;

    } catch (error) {
        console.error(error);
        resultBox.innerText = "Error connecting to backend";
    }
}

async function loadIdeas() {
    const res = await fetch("https://tunify-api.onrender.com/ideas ");
    const data = await res.json();

    const list = document.getElementById("ideas");
    list.innerHTML = "";

    data.ideas.forEach(item => {
        const li = document.createElement("li");
        li.innerText = item.idea;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
